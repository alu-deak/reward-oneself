<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <title>添加新任务</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <a href="index.html" class="back-link-fixed">
        <i class="fas fa-home"></i>
        <span>返回主页</span>
    </a>

    <div class="form-page">
        <div class="form-card">
            <h1 class="form-title"><i class="fas fa-list-alt"></i> 添加新任务</h1>
            <form name="taskForm" onsubmit="return handleAddTask(event)">
                <div class="form-group">
                    <label class="form-label" for="name">任务名称</label>
                    <input class="form-control" id="name" name="name" placeholder="输入任务名称" required type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" for="points">分值</label>
                    <input class="form-control" id="points" min="1" name="points" placeholder="输入分值" required type="number">
                </div>
                <div class="form-group">
                    <label class="form-label" for="time">所需时间（分钟）</label>
                    <input class="form-control" id="time" min="0" name="time" placeholder="输入所需时间（0表示即时完成）" required type="number">
                </div>

                <fieldset class="fieldset">
                    <legend class="legend">重要性</legend>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input name="importance" type="radio" value="max" required>
                            <span><i class="fas fa-star"></i> 特别重要</span>
                        </label>
                        <label class="radio-item">
                            <input name="importance" type="radio" value="4">
                            <span>很重要</span>
                        </label>
                        <label class="radio-item">
                            <input name="importance" type="radio" value="3">
                            <span>重要</span>
                        </label>
                        <label class="radio-item">
                            <input name="importance" type="radio" value="0">
                            <span>不重要</span>
                        </label>
                    </div>
                </fieldset>

                <fieldset class="fieldset">
                    <legend class="legend">价值</legend>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input name="value" type="radio" value="3" required>
                            <span><i class="fas fa-gem"></i> 高价值</span>
                        </label>
                        <label class="radio-item">
                            <input name="value" type="radio" value="2">
                            <span>中价值</span>
                        </label>
                        <label class="radio-item">
                            <input name="value" type="radio" value="1">
                            <span>低价值</span>
                        </label>
                    </div>
                </fieldset>

                <fieldset class="fieldset">
                    <legend class="legend">紧急度</legend>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input name="urgent" type="radio" value="3" required>
                            <span><i class="fas fa-fire"></i> 很紧急</span>
                        </label>
                        <label class="radio-item">
                            <input name="urgent" type="radio" value="2">
                            <span>紧急</span>
                        </label>
                        <label class="radio-item">
                            <input name="urgent" type="radio" value="1">
                            <span>不紧急</span>
                        </label>
                    </div>
                </fieldset>

                <fieldset class="fieldset">
                    <legend class="legend">重复</legend>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input name="repeat" type="radio" value="True" required>
                            <span><i class="fas fa-sync"></i> 重复</span>
                        </label>
                        <label class="radio-item">
                            <input name="repeat" type="radio" value="False">
                            <span>不重复</span>
                        </label>
                    </div>
                </fieldset>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>
                        <span>保存任务</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script>
        Storage.initDefaults();
        function handleAddTask(e) {
            e.preventDefault();
            const form = document.forms['taskForm'];
            const name = form['name'].value.trim();
            const points = Number(form['points'].value);
            const time = Number(form['time'].value);
            const importance = form['importance'] ? form['importance'].value : null;
            const value = form['value'] ? form['value'].value : null;
            const urgent = form['urgent'] ? form['urgent'].value : null;
            const repeat = form['repeat'] ? (form['repeat'].value === 'True') : false;
            
            if (!name) {
                showModal('提示', '请输入任务名称');
                return false;
            }
            if (points <= 0) {
                showModal('提示', '请输入有效的积分值（大于0的数字）');
                return false;
            }
            if (time < 0) {
                showModal('提示', '请输入有效的时间（大于等于0的数字）');
                return false;
            }
            if (!importance) {
                showModal('提示', '请选择任务重要性');
                return false;
            }
            if (!value) {
                showModal('提示', '请选择任务价值');
                return false;
            }
            if (!urgent) {
                showModal('提示', '请选择任务紧急程度');
                return false;
            }
            
            let priority;
            if (importance === 'max') {
                priority = 'max';
            } else {
                priority = Number(importance) * 4 + Number(urgent) * 2 + Number(value) * 3 - Math.round(time / 10);
            }
            
            const task = {
                name: name,
                points: points,
                time: time,
                importance: importance,
                value: value,
                urgent: urgent,
                repeat: repeat,
                priority: priority
            };
            Storage.addItem('tasks', task);
            showModal('成功', '任务添加成功！', () => {
                window.location.href = 'index.html';
            });
            return false;
        }

        function showModal(title, text, onClose) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal">
                    <h3 class="modal-title">${title}</h3>
                    <p class="modal-text">${text}</p>
                    <div class="modal-actions">
                        <button class="btn btn-primary" id="modal-ok-btn">确定</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('modal-ok-btn').addEventListener('click', () => {
                overlay.remove();
                if (onClose) onClose();
            });
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.remove();
                    if (onClose) onClose();
                }
            });
        }
    </script>
</body>

</html>
