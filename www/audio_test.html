<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { margin: 10px; padding: 10px 20px; font-size: 16px; }
        #log { margin-top: 20px; padding: 10px; background: #f0f0f0; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>音频测试页面</h1>
    
    <h2>方法1: HTML Audio</h2>
    <button onclick="testHTMLAudio('finish.mp3')">测试 finish.mp3</button>
    <button onclick="testHTMLAudio('timer.mp3')">测试 timer.mp3</button>
    
    <h2>方法2: Web Audio API</h2>
    <button onclick="testWebAudio('finish.mp3')">Web Audio 播放 finish.mp3</button>
    <button onclick="testWebAudio('timer.mp3')">Web Audio 播放 timer.mp3</button>
    
    <h2>日志</h2>
    <div id="log"></div>

    <script>
        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + msg + '</div>';
            console.log(msg);
        }

        function testHTMLAudio(filename) {
            log('开始测试 HTML Audio: ' + filename);
            const audio = new Audio('assets/' + filename);
            audio.volume = 1.0;
            
            audio.onloadeddata = () => log('音频数据已加载');
            audio.oncanplay = () => log('音频可以播放');
            audio.onended = () => log('音频播放结束');
            audio.onerror = (e) => log('错误: ' + e.message);
            
            audio.play().then(() => {
                log('play() 调用成功');
            }).catch(e => {
                log('play() 失败: ' + e.message);
            });
        }

        function testWebAudio(filename) {
            log('开始测试 Web Audio API: ' + filename);
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            audioContext.resume().then(() => {
                log('AudioContext 状态: ' + audioContext.state);
                
                fetch('assets/' + filename)
                    .then(response => {
                        log('fetch 响应状态: ' + response.status);
                        return response.arrayBuffer();
                    })
                    .then(arrayBuffer => {
                        log('arrayBuffer 大小: ' + arrayBuffer.byteLength);
                        return audioContext.decodeAudioData(arrayBuffer);
                    })
                    .then(audioBuffer => {
                        log('音频解码成功，时长: ' + audioBuffer.duration.toFixed(2) + '秒');
                        
                        const source = audioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(audioContext.destination);
                        
                        source.onended = () => log('Web Audio 播放结束');
                        
                        source.start(0);
                        log('Web Audio 开始播放');
                    })
                    .catch(e => {
                        log('Web Audio 错误: ' + e.message);
                    });
            }).catch(e => {
                log('AudioContext resume 失败: ' + e.message);
            });
        }
    </script>
</body>
</html>
