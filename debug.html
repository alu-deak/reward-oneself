<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>调试主页</title>
    <link rel="icon" href="assets/favicon.ico">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <h1>调试主页</h1>
    <button onclick="debugStorage()">调试localStorage</button>
    <button onclick="debugRender()">调试渲染</button>
    <pre id="output"></pre>
    <div id="tables">
        <table id="reward">
            <tr class="table-header">
                <td><h3>奖励名称</h3></td>
                <td><h3>分值</h3></td>
            </tr>
            <tbody id="rof-rewards"></tbody>
        </table>
    </div>
    <script src="js/storage.js"></script>
    <script>
        Storage.initDefaults();
        function debugStorage(){
            const output = document.getElementById('output');
            output.textContent = '=== localStorage 内容 ===\n';
            for(let i = 0; i < localStorage.length; i++){
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                output.textContent += `${key}: ${value}\n`;
            }
            output.textContent += '\n=== Storage.getAll("rewards") ===\n';
            output.textContent += JSON.stringify(Storage.getAll('rewards'), null, 2);
        }
        function debugRender(){
            const tbody = document.getElementById('rof-rewards');
            tbody.innerHTML = '';
            const rewards = Storage.getAll('rewards');
            console.log('rewards:', rewards);
            document.getElementById('output').textContent = '奖励数量: ' + rewards.length + '\n' + JSON.stringify(rewards, null, 2);
            rewards.forEach(r => {
                console.log('渲染奖励:', r);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><button class="btn-link" onclick="redeemReward('${r.id}', ${r.value})">${r.name}</button></td><td>${r.value}</td>`;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
