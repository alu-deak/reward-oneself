<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon" href="assets/favicon.ico">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <title>添加新奖励</title>
</head>

<body>
    <h1 class="title">添加新奖励</h1>
    <form name="rewardForm" onsubmit="return handleAddReward(event)" class="container mt-4" style="max-width: 600px;">
        <div class="card mb-3">
            <div class="card-body">
                <div class="mb-3">
                    <label for="name">名称</label>
                    <input class="form-control" id="name" name="name" required type="text">
                </div>
                <div class="mb-3">
                    <label for="points">分值</label>
                    <input class="form-control" id="points" min="1" name="points" required type="number">
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
            💾提交
        </button>
    </form>
    <p><a href="index.html">🏠返回主页</a></p>

    <script src="js/storage.js"></script>
    <script>
        Storage.initDefaults();
        function handleAddReward(e){
            e.preventDefault();
            const form = document.forms['rewardForm'];
            const name = form['name'].value.trim();
            const points = Number(form['points'].value);
            
            if(!name){
                alert('请输入奖励名称');
                return false;
            }
            if(points <= 0){
                alert('请输入有效的积分值（大于0的数字）');
                return false;
            }
            
            const reward = { name: name, value: points };
            Storage.addItem('rewards', reward);
            window.location.href = 'index.html';
            return false;
        }
    </script>
</body>

</html>
