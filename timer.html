<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon" href="assets/favicon.ico">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <title>计时器</title>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timer-div {
            width: 80%;
            height: 50%;
            background: #3498db;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 768px) {
            footer {
                height: 10%;
                width: 100%;
                font-size: 10px;
            }
        }
    </style>

</head>

<body>
    <div class="container mt-4 timer-div" style="max-width: 800px;">
        <h1 class="title" id="task-name">任务</h1>
        <b id="status">工作中</b>
        <div id="time-display" style="font-size: 48px; margin: 20px 0;">00:00</div>
        <p id="audio-prompt" style="color: rgb(255, 255, 0); background-color: rgba(255, 0, 0, 0.5);">🔐点击页面任意位置解锁提示音播放</p>
        <div id="result-container" style="display: none;">
            <h2>任务完成！</h2>
            <p>获得积分：<span id="result-points">0</span></p>
            <div class="d-grid gap-2">
                <button onclick="window.location.href='index.html'" class="btn btn-primary">🏠返回主页</button>
            </div>
        </div>
    </div>
    <!-- 引入 NoSleep.js -->
    <script src="js/NoSleep.min.js"></script>
    <script src="js/storage.js"></script>
    <script>
        // 初始化 NoSleep
        var noSleep = new NoSleep();
        console.log('NoSleep 已初始化');

        Storage.initDefaults();

        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('taskId');
        const points = Number(urlParams.get('points'));
        const time = Number(urlParams.get('time'));
        const repeat = urlParams.get('repeat') === 'true';

        // 获取任务名称
        const task = Storage.findById('tasks', taskId);
        if(task){
            document.getElementById('task-name').textContent = task.name;
        }

        // 初始化参数
        const workTime = time;
        const restRatio = Storage.getRestRatio();
        const restTime = Math.round(workTime / restRatio);

        let currentTime = workTime * 60;
        let isWorking = true;
        let timerInterval;
        let audioContext;

        // 用户首次点击解锁自动播放和防止休眠
        function unlockAudio() {
            try {
                noSleep.enable();
                console.log('NoSleep 已启用');
            } catch (error) {
                console.error('NoSleep 启动失败：', error);
            }
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            console.log('准备 resume AudioContext...');
            audioContext.resume().then(() => {
                console.log('音频上下文已解锁，状态:', audioContext.state);
                document.getElementById('audio-prompt').style.display = 'none';
                
                // 测试音频播放
                console.log('创建测试音频对象...');
                const testAudio = new Audio("assets/finish.mp3");
                testAudio.volume = 0.5;
                
                testAudio.oncanplay = () => {
                    console.log('音频文件可以播放');
                };
                
                testAudio.onerror = (e) => {
                    console.error('音频加载错误:', e);
                };
                
                testAudio.onloadstart = () => {
                    console.log('开始加载音频');
                };
                
                testAudio.onloadeddata = () => {
                    console.log('音频数据已加载');
                };
                
                testAudio.load();
                console.log('load() 已调用');
                
                // 播放测试音
                console.log('准备播放测试音频...');
                const playPromise = testAudio.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log('测试音频播放成功');
                        testAudio.pause();
                        testAudio.currentTime = 0;
                    }).catch(e => {
                        console.error('测试音频播放失败:', e);
                    });
                } else {
                    console.log('play() 返回 undefined');
                }
            }).catch(e => {
                console.error('AudioContext resume 失败:', e);
            });
            
            document.body.removeEventListener('click', unlockAudio);
        }
        document.body.addEventListener('click', unlockAudio);

        // 更新时间显示
        function updateDisplay() {
            const minutes = Math.floor(currentTime / 60);
            const seconds = currentTime % 60;
            document.getElementById('time-display').textContent =
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // 切换阶段
        function switchPhase() {
            isWorking = !isWorking;
            currentTime = isWorking ? workTime * 60 : restTime * 60;
            document.getElementById('status').textContent = isWorking ? '工作中' : '休息中';

            // 休息阶段开始时播放音频（阻塞式）
            if (!isWorking && restTime > 0) {
                const audio = new Audio("assets/timer.mp3");
                audio.play().catch(error => {
                    console.error('音频播放失败:', error);
                });
            }
        }

        // 倒计时结束处理
        function handleFinish() {
            clearInterval(timerInterval);
            console.log('handleFinish 被调用 - 当前阶段: ' + (isWorking ? '工作' : '休息'));
            
            if (isWorking) {
                console.log('工作阶段结束，休息时间: ' + restTime + ' 分钟');
                // 工作结束后切换到休息
                if (restTime > 0) {
                    console.log('切换到休息阶段');
                    switchPhase();
                    timerInterval = setInterval(() => {
                        currentTime--;
                        updateDisplay();
                        if (currentTime <= 0) handleFinish();
                    }, 1000);
                } else {
                    // 无休息时间直接完成
                    console.log('无休息时间，直接完成任务');
                    
                    // 播放完成音效
                    console.log('准备播放完成音效...');
                    const finishAudio = new Audio("assets/finish.mp3");
                    finishAudio.volume = 1.0;
                    
                    function playAudioBlocking() {
                        return new Promise((resolve, reject) => {
                            console.log('开始播放完成音效...');
                            
                            finishAudio.onended = () => {
                                console.log('完成音效播放完毕');
                                resolve();
                            };
                            
                            finishAudio.onerror = (e) => {
                                console.error('完成音效播放错误:', e);
                                resolve();
                            };
                            
                            finishAudio.play().then(() => {
                                console.log('play() 方法调用成功');
                            }).catch(error => {
                                console.error('完成音效播放失败:', error);
                                resolve();
                            });
                        });
                    }
                    
                    playAudioBlocking().then(() => {
                        completeTask();
                    });
                }
            } else {
                // 休息结束，播放完成音效（阻塞式）
                console.log('准备播放完成音效...');
                const finishAudio = new Audio("assets/finish.mp3");
                finishAudio.volume = 1.0;
                
                function playAudioBlocking() {
                    return new Promise((resolve, reject) => {
                        console.log('开始播放完成音效...');
                        
                        finishAudio.onended = () => {
                            console.log('完成音效播放完毕');
                            resolve();
                        };
                        
                        finishAudio.onerror = (e) => {
                            console.error('完成音效播放错误:', e);
                            resolve(); // 即使失败也继续
                        };
                        
                        finishAudio.oncanplay = () => {
                            console.log('音频已准备好播放');
                        };
                        
                        finishAudio.play().then(() => {
                            console.log('play() 方法调用成功');
                        }).catch(error => {
                            console.error('完成音效播放失败:', error);
                            // 尝试使用 AudioContext 播放
                            if (audioContext) {
                                console.log('尝试使用 AudioContext 播放...');
                                fetch('assets/finish.mp3')
                                    .then(response => response.arrayBuffer())
                                    .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
                                    .then(audioBuffer => {
                                        const source = audioContext.createBufferSource();
                                        source.buffer = audioBuffer;
                                        source.connect(audioContext.destination);
                                        source.onended = () => {
                                            console.log('AudioContext 播放完毕');
                                            resolve();
                                        };
                                        source.start(0);
                                    })
                                    .catch(e => {
                                        console.error('AudioContext 播放失败:', e);
                                        resolve();
                                    });
                            } else {
                                resolve();
                            }
                        });
                    });
                }
                
                playAudioBlocking().then(() => {
                    completeTask();
                });
            }
        }

        // 完成任务
        function completeTask() {
            noSleep.disable();
            console.log('NoSleep 已禁用');
            
            // 更新积分
            Storage.changePoints(points);
            
            // 如果不是重复任务，删除任务
            if(!repeat){
                Storage.removeItemById('tasks', taskId);
            }
            
            // 显示结果
            document.querySelector('.timer-div > h1').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('time-display').style.display = 'none';
            document.getElementById('audio-prompt').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('result-points').textContent = points;
        }

        // 启动计时器
        updateDisplay();
        timerInterval = setInterval(() => {
            currentTime--;
            updateDisplay();
            if (currentTime <= 0) handleFinish();
        }, 1000);
    </script>
</body>

</html>
